services:
  api:
    build: .
    image: ai-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - qdrant                   # Ensures the database boots up before the API

  qdrant:
    image: qdrant/qdrant:latest  # Pulls the official Qdrant database image
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage  # The new permanent home for your AI memory

volumes:
  qdrant_storage:

